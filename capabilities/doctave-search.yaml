naftiko: 1.0.0-alpha2
info:
  label: Doctave API — Search
  description: 'Doctave API — Search. 1 operations. Lead operation: Doctave Search Site. Self-contained Naftiko capability
    covering one Doctave business surface.'
  tags:
  - Doctave
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCTAVE_API_KEY: DOCTAVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: doctave-search
    baseUri: https://api.doctave.com/v1
    description: Doctave API — Search business capability. Self-contained, no shared references.
    resources:
    - name: sites-siteId-search
      path: /sites/{siteId}/search
      operations:
      - name: searchsite
        method: GET
        description: Doctave Search Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: The search query string.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return.
        - name: offset
          in: query
          type: integer
          description: Number of results to skip for pagination.
    authentication:
      type: bearer
      token: '{{env.DOCTAVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: doctave-search-rest
    port: 8080
    description: REST adapter for Doctave API — Search. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/sites/{siteid}/search
      name: sites-siteid-search
      description: REST surface for sites-siteId-search.
      operations:
      - method: GET
        name: searchsite
        description: Doctave Search Site
        call: doctave-search.searchsite
        with:
          q: rest.q
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: doctave-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Doctave API — Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: doctave-search-site
      description: Doctave Search Site
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: doctave-search.searchsite
      with:
        q: tools.q
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
