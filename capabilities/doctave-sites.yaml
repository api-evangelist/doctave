naftiko: 1.0.0-alpha2
info:
  label: Doctave API — Sites
  description: 'Doctave API — Sites. 5 operations. Lead operation: Doctave List Sites. Self-contained Naftiko capability covering
    one Doctave business surface.'
  tags:
  - Doctave
  - Sites
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCTAVE_API_KEY: DOCTAVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: doctave-sites
    baseUri: https://api.doctave.com/v1
    description: Doctave API — Sites business capability. Self-contained, no shared references.
    resources:
    - name: sites
      path: /sites
      operations:
      - name: listsites
        method: GET
        description: Doctave List Sites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsite
        method: POST
        description: Doctave Create Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sites-siteId
      path: /sites/{siteId}
      operations:
      - name: getsite
        method: GET
        description: Doctave Get Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesite
        method: PUT
        description: Doctave Update Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesite
        method: DELETE
        description: Doctave Delete Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DOCTAVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: doctave-sites-rest
    port: 8080
    description: REST adapter for Doctave API — Sites. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/sites
      name: sites
      description: REST surface for sites.
      operations:
      - method: GET
        name: listsites
        description: Doctave List Sites
        call: doctave-sites.listsites
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsite
        description: Doctave Create Site
        call: doctave-sites.createsite
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/{siteid}
      name: sites-siteid
      description: REST surface for sites-siteId.
      operations:
      - method: GET
        name: getsite
        description: Doctave Get Site
        call: doctave-sites.getsite
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesite
        description: Doctave Update Site
        call: doctave-sites.updatesite
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesite
        description: Doctave Delete Site
        call: doctave-sites.deletesite
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: doctave-sites-mcp
    port: 9090
    transport: http
    description: MCP adapter for Doctave API — Sites. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: doctave-list-sites
      description: Doctave List Sites
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: doctave-sites.listsites
      outputParameters:
      - type: object
        mapping: $.
    - name: doctave-create-site
      description: Doctave Create Site
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: doctave-sites.createsite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: doctave-get-site
      description: Doctave Get Site
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: doctave-sites.getsite
      outputParameters:
      - type: object
        mapping: $.
    - name: doctave-update-site
      description: Doctave Update Site
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: doctave-sites.updatesite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: doctave-delete-site
      description: Doctave Delete Site
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: doctave-sites.deletesite
      outputParameters:
      - type: object
        mapping: $.
