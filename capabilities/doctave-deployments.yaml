naftiko: 1.0.0-alpha2
info:
  label: Doctave API — Deployments
  description: 'Doctave API — Deployments. 3 operations. Lead operation: Doctave List Deployments. Self-contained Naftiko
    capability covering one Doctave business surface.'
  tags:
  - Doctave
  - Deployments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCTAVE_API_KEY: DOCTAVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: doctave-deployments
    baseUri: https://api.doctave.com/v1
    description: Doctave API — Deployments business capability. Self-contained, no shared references.
    resources:
    - name: sites-siteId-deployments
      path: /sites/{siteId}/deployments
      operations:
      - name: listdeployments
        method: GET
        description: Doctave List Deployments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createdeployment
        method: POST
        description: Doctave Create Deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sites-siteId-deployments-deploymentId
      path: /sites/{siteId}/deployments/{deploymentId}
      operations:
      - name: getdeployment
        method: GET
        description: Doctave Get Deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DOCTAVE_API_KEY}}'
  exposes:
  - type: rest
    namespace: doctave-deployments-rest
    port: 8080
    description: REST adapter for Doctave API — Deployments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sites/{siteid}/deployments
      name: sites-siteid-deployments
      description: REST surface for sites-siteId-deployments.
      operations:
      - method: GET
        name: listdeployments
        description: Doctave List Deployments
        call: doctave-deployments.listdeployments
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdeployment
        description: Doctave Create Deployment
        call: doctave-deployments.createdeployment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sites/{siteid}/deployments/{deploymentid}
      name: sites-siteid-deployments-deploymentid
      description: REST surface for sites-siteId-deployments-deploymentId.
      operations:
      - method: GET
        name: getdeployment
        description: Doctave Get Deployment
        call: doctave-deployments.getdeployment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: doctave-deployments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Doctave API — Deployments. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: doctave-list-deployments
      description: Doctave List Deployments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: doctave-deployments.listdeployments
      outputParameters:
      - type: object
        mapping: $.
    - name: doctave-create-deployment
      description: Doctave Create Deployment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: doctave-deployments.createdeployment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: doctave-get-deployment
      description: Doctave Get Deployment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: doctave-deployments.getdeployment
      outputParameters:
      - type: object
        mapping: $.
