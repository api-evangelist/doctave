          type: object
          value: $.
      - name: updatepage
        method: PUT
        description: Doctave Update Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletepage
        method: DELETE
        description: Doctave Delete Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sites-siteid-search
      path: /sites/{siteId}/search
      operations:
      - name: searchsite
        method: GET
        description: Doctave Search Site
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: The search query string.
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return.
        - name: offset
          in: query
          type: integer
          description: Number of results to skip for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
