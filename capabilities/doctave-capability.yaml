naftiko: 1.0.0-alpha2
info:
  label: Doctave API
  description: The Doctave API provides programmatic access to manage documentation sites, deployments, pages, and search
    on the Doctave docs-as-code platform. It allows teams to automate documentation workflows, trigger deployments, manage
    site configurations, and integrate documentation search into their own applications and developer portals.
  tags:
  - Doctave
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: doctave
    baseUri: https://api.doctave.com/v1
    description: Doctave API HTTP API.
    authentication:
      type: bearer
      token: '{{DOCTAVE_TOKEN}}'
    resources:
    - name: sites
      path: /sites
      operations:
      - name: listsites
        method: GET
        description: Doctave List Sites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsite
        method: POST
        description: Doctave Create Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sites-siteid
      path: /sites/{siteId}
      operations:
      - name: getsite
        method: GET
        description: Doctave Get Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesite
        method: PUT
        description: Doctave Update Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletesite
        method: DELETE
        description: Doctave Delete Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sites-siteid-deployments
      path: /sites/{siteId}/deployments
      operations:
      - name: listdeployments
        method: GET
        description: Doctave List Deployments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createdeployment
        method: POST
        description: Doctave Create Deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sites-siteid-deployments-deploymentid
      path: /sites/{siteId}/deployments/{deploymentId}
      operations:
      - name: getdeployment
        method: GET
        description: Doctave Get Deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sites-siteid-pages
      path: /sites/{siteId}/pages
      operations:
      - name: listpages
        method: GET
        description: Doctave List Pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createpage
        method: POST
        description: Doctave Create Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sites-siteid-pages-pageid
      path: /sites/{siteId}/pages/{pageId}
      operations:
